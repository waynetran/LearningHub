<g font-family="DejaVu Sans,Lohit Bengali" font-size="18" font-weight="bold">
<switch transform="translate(546,40)" fill="#0000E0" text-anchor="end"><text id="trsvg106-pt-br" systemLanguage="pt-br"><tspan id="trsvg36-pt-br">Aumento da energia</tspan><tspan x="-20" y="18" id="trsvg37-pt-br">dos orbitais</tspan></text>

<text systemLanguage="ca" id="trsvg88"><tspan id="trsvg2">Òrbites d'energia</tspan><tspan x="-20" y="18" id="trsvg3">creixent</tspan></text>
<text systemLanguage="de" id="trsvg89"><tspan id="trsvg4">zunehmende Energie</tspan><tspan x="-20" y="18" id="trsvg5">der Umlaufbahnen</tspan></text>
<text systemLanguage="en" id="trsvg90"><tspan id="trsvg6">Increasing energy</tspan><tspan x="-20" y="18" id="trsvg7">of orbits</tspan></text>
<text systemLanguage="ru" id="trsvg90"><tspan id="trsvg6">Увеличение орбитальной</tspan><tspan x="-20" y="18" id="trsvg7">энергии</tspan></text>
<text systemLanguage="es" id="trsvg91"><tspan id="trsvg8">energía creciente</tspan><tspan x="-20" y="18" id="trsvg9">de las órbitas</tspan></text>
<text systemLanguage="fr" id="trsvg92"><tspan id="trsvg10">Orbites d'énergie</tspan><tspan x="-20" y="18" id="trsvg11">croissante</tspan></text>
<text systemLanguage="gu" id="trsvg93"><tspan id="trsvg12">ભ્રમણકક્ષાની</tspan><tspan x="-20" y="18" id="trsvg13">વધતી ઉર્જા</tspan></text>
<text systemLanguage="id" id="trsvg94"><tspan id="trsvg14">Energi orbit</tspan><tspan x="-20" y="18" id="trsvg15">meningkat</tspan></text>
<text systemLanguage="it" id="trsvg95"><tspan id="trsvg16">Aumento di energia</tspan><tspan x="-20" y="18" id="trsvg17">dell'orbita</tspan></text>
<text systemLanguage="mk" id="trsvg96"><tspan id="trsvg18">Растечка енергија</tspan><tspan x="-20" y="18" id="trsvg19">на орбитите</tspan></text>
<text systemLanguage="ml" id="trsvg97"><tspan id="trsvg20">പരിക്രമണപഥങ്ങളു</tspan><tspan x="-20" y="18" id="trsvg21">വർദ്ധനവ്</tspan></text>
<text systemLanguage="mr" id="trsvg98"><tspan id="trsvg22">कक्षांच्या वाढत्या उर्जा</tspan></text>
<text systemLanguage="pl" id="trsvg99"><tspan id="trsvg23">Zwiększanie się</tspan><tspan x="-20" y="18" id="trsvg24">energii orbit</tspan></text>
<text systemLanguage="pt" id="trsvg100"><tspan id="trsvg25">Aumento da energia</tspan><tspan x="-20" y="18" id="trsvg26">dos orbitais</tspan></text>
<text systemLanguage="sr" id="trsvg101"><tspan id="trsvg27">Повећање енергије</tspan><tspan x="-20" y="18" id="trsvg28">орбита</tspan></text>
<text systemLanguage="ta" id="trsvg102"><tspan id="trsvg29">சுற்று வட்டப்பதைகளி</tspan><tspan x="-20" y="18" id="trsvg30">அதிகரிக்கப்படும் ஆற்ற</tspan></text>
<text systemLanguage="te" id="trsvg103"><tspan id="trsvg31">కక్ష్యల శక్తి పెరుగుతుంది</tspan></text>
<text systemLanguage="tr" id="trsvg104"><tspan id="trsvg32">Artan yörünge</tspan><tspan x="-20" y="18" id="trsvg33">enerjisi</tspan></text>
<text systemLanguage="vi" id="trsvg105"><tspan id="trsvg34">Năng lượng quỹ đạo</tspan><tspan x="-20" y="18" id="trsvg35">tăng dần</tspan></text>

<text systemLanguage="as" id="trsvg87"><tspan id="trsvg1">শক্তিস্তৰৰ শক্তি বৃদ্ধি</tspan></text><text systemLanguage="bn" id="trsvg87"><tspan id="trsvg1">শক্তিস্তৰৰ শক্তি বৃদ্ধি</tspan></text><text id="trsvg106-uk" systemLanguage="uk"><tspan id="trsvg36-uk">Збільшення енергії</tspan><tspan x="-20" y="18" id="trsvg37-uk">орбіт</tspan></text><text id="trsvg106"><tspan id="trsvg36">Increasing energy</tspan><tspan x="-20" y="18" id="trsvg37">of the orbits</tspan></text></switch>
<switch transform="translate(304,467)" fill="#EC0000"><text id="trsvg126-pt-br" systemLanguage="pt-br"><tspan id="trsvg76-pt-br">Um fóton é emitido</tspan><tspan x="20" y="18" id="trsvg77-pt-br">com energia E = hf</tspan></text>

<text systemLanguage="ca" id="trsvg108"><tspan id="trsvg40">S'emet un fotó</tspan><tspan x="20" y="18" id="trsvg41">d'energia E = hf</tspan></text>
<text systemLanguage="de" id="trsvg109"><tspan id="trsvg42">emitiertes Photon</tspan><tspan x="20" y="18" id="trsvg43">mit der Energie E = hf</tspan></text>
<text systemLanguage="en" id="trsvg110"><tspan id="trsvg44">A photon is emitted</tspan><tspan x="20" y="18" id="trsvg45">with energy E = hf</tspan></text>
<text systemLanguage="ru" id="trsvg110"><tspan id="trsvg44">Излучаемый фотон</tspan><tspan x="20" y="18" id="trsvg45">с энергией E = hf</tspan></text>
<text systemLanguage="es" id="trsvg111"><tspan id="trsvg46">fotón emitido</tspan><tspan x="20" y="18" id="trsvg47">con la energía E = hf</tspan></text>
<text systemLanguage="fr" id="trsvg112"><tspan id="trsvg48">Un photon est émis</tspan><tspan x="20" y="18" id="trsvg49">avec une énergie E = hf</tspan></text>
<text systemLanguage="gu" id="trsvg113"><tspan id="trsvg50">એક ફોટોન ઉર્જા (E) સાથે</tspan><tspan x="20" y="18" id="trsvg51">ઉત્સર્જિત થાય છે  E = hf</tspan></text>
<text systemLanguage="id" id="trsvg114"><tspan id="trsvg52">Foton dipancarkan</tspan><tspan x="20" y="18" id="trsvg53">dengan energi E = hf</tspan></text>
<text systemLanguage="it" id="trsvg115"><tspan id="trsvg54">Viene emesso un fotone</tspan><tspan x="20" y="18" id="trsvg55">fotonecon energia E = hf</tspan></text>
<text systemLanguage="mk" id="trsvg116"><tspan id="trsvg56">Се оддава фотон</tspan><tspan x="20" y="18" id="trsvg57">со енергија E = hf</tspan></text>
<text systemLanguage="ml" id="trsvg117"><tspan id="trsvg58">ഒരു ഫോട്ടോൺ E = hf</tspan><tspan x="20" y="18" id="trsvg59">ഊർജ്ജത്തോടെ പുറ</tspan></text>
<text systemLanguage="mr" id="trsvg118"><tspan id="trsvg60">एक फोटॉन उत्सर्जित</tspan><tspan x="20" y="18" id="trsvg61">होतो  E=hf</tspan></text>
<text systemLanguage="pl" id="trsvg119"><tspan id="trsvg62">Emisja fotonu</tspan><tspan x="20" y="18" id="trsvg63">o energii E = hf</tspan></text>
<text systemLanguage="pt" id="trsvg120"><tspan id="trsvg64">Um fóton é emitido</tspan><tspan x="20" y="18" id="trsvg65">com energia E = hf</tspan></text>
<text systemLanguage="sr" id="trsvg121"><tspan id="trsvg66">Фотон се емитује</tspan><tspan x="20" y="18" id="trsvg67">са енергијом E=hf</tspan></text>
<text systemLanguage="ta" id="trsvg122"><tspan id="trsvg68">E=hf என்ற ஆற்றலில்</tspan><tspan x="20" y="18" id="trsvg69">உமிழப்படும் போட்டா</tspan></text>
<text systemLanguage="te" id="trsvg123"><tspan id="trsvg70">E = hf శక్తితో</tspan><tspan x="20" y="18" id="trsvg71">ఒక ఫోటాన్ విడుదలైంది</tspan></text>
<text systemLanguage="tr" id="trsvg124"><tspan id="trsvg72">E = hf enerjisiyle yayilan</tspan><tspan x="20" y="18" id="trsvg73">bir foton</tspan></text>
<text systemLanguage="vi" id="trsvg125"><tspan id="trsvg74">Một photon được phát ra</tspan><tspan x="20" y="18" id="trsvg75">với năng lượng E = hf</tspan></text>

<text systemLanguage="as" id="trsvg107"><tspan id="trsvg38">শক্তি বিকিৰণৰ ফলত</tspan><tspan x="20" y="18" id="trsvg39">এটা ফ’টন নিৰ্গত হয়  E = hf</tspan></text><text systemLanguage="bn" id="trsvg107"><tspan id="trsvg38">শক্তি বিকিৰণৰ ফলত</tspan><tspan x="20" y="18" id="trsvg39">এটা ফ’টন নিৰ্গত হয়  E = hf</tspan></text><text id="trsvg126-uk" systemLanguage="uk"><tspan id="trsvg76-uk">Випромінюється фотон</tspan><tspan x="20" y="18" id="trsvg77-uk">з енергією E = hf</tspan></text><text id="trsvg126"><tspan id="trsvg76">Photon is emitted</tspan><tspan x="20" y="18" id="trsvg77">with the energy E = hf</tspan></text></switch>
